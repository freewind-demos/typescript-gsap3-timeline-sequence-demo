<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GSAP 3 Timeline 序列动画演示</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      padding: 40px;
    }
    h1 {
      text-align: center;
      margin-bottom: 30px;
      color: #00d9ff;
    }
    .demo-section {
      max-width: 800px;
      margin: 0 auto 60px;
      padding: 30px;
      background: #16213e;
      border-radius: 12px;
    }
    .demo-section h2 {
      color: #e94560;
      margin-bottom: 20px;
      font-size: 18px;
    }
    .box {
      width: 80px;
      height: 80px;
      border-radius: 12px;
      margin: 20px auto;
    }
    .box-1 { background: linear-gradient(135deg, #667eea, #764ba2); }
    .box-2 { background: linear-gradient(135deg, #f093fb, #f5576c); }
    .box-3 { background: linear-gradient(135deg, #4facfe, #00f2fe); }
    .controls {
      text-align: center;
      margin: 30px 0;
    }
    button {
      background: #0f3460;
      color: #fff;
      border: none;
      padding: 10px 20px;
      margin: 0 6px 10px 0;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background: #e94560;
    }
    .info {
      background: #0f3460;
      border-radius: 8px;
      padding: 15px;
      margin-top: 20px;
      font-family: monospace;
      font-size: 13px;
      line-height: 1.8;
    }
    .stagger-container {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin: 20px 0;
    }
    .stagger-item {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, #a29bfe, #6c5ce7);
      border-radius: 8px;
    }
  </style>
  <script type="module" crossorigin src="/assets/index-DROZpbcu.js"></script>
</head>
<body>
  <h1>GSAP 3 Timeline 序列动画演示</h1>

  <!-- Demo 1: 基础序列动画 -->
  <div class="demo-section">
    <h2>1. 基础 Timeline 序列</h2>
    <div class="controls">
      <button onclick="basicTimeline.restart()">播放序列</button>
      <button onclick="basicTimeline.reverse()">反向播放</button>
      <button onclick="basicTimeline.pause()">暂停</button>
    </div>
    <div class="box box-1" id="box1"></div>
    <div class="box box-2" id="box2"></div>
    <div class="box box-3" id="box3"></div>
    <div class="info">
      <div>当前时间: <span id="time1">0</span>s</div>
      <div>总时长: <span id="duration1">0</span>s</div>
    </div>
  </div>

  <!-- Demo 2: 交错动画 -->
  <div class="demo-section">
    <h2>2. 交错动画 (Stagger)</h2>
    <div class="controls">
      <button onclick="staggerTimeline.restart()">播放</button>
      <button onclick="staggerTimeline.reverse()">反向</button>
    </div>
    <div class="stagger-container" id="stagger-container">
      <div class="stagger-item"></div>
      <div class="stagger-item"></div>
      <div class="stagger-item"></div>
      <div class="stagger-item"></div>
      <div class="stagger-item"></div>
    </div>
    <div class="info">
      <div>每个元素间隔 0.1s 依次动画</div>
    </div>
  </div>

  <!-- Demo 3: 时间线嵌套 -->
  <div class="demo-section">
    <h2>3. 时间线嵌套</h2>
    <div class="controls">
      <button onclick="nestedTimeline.restart()">播放</button>
    </div>
    <div class="box box-1" id="box-nested1"></div>
    <div class="box box-2" id="box-nested2"></div>
    <div class="info">
      <div>父时间线包含两个子时间线，实现复杂编排</div>
    </div>
  </div>

  <!-- Demo 4: 时间线标签 -->
  <div class="demo-section">
    <h2>4. 时间线标签 (Label)</h2>
    <div class="controls">
      <button onclick="labelTimeline.restart()">播放</button>
      <button onclick="labelTimeline.seek('intro')">跳转 Intro</button>
      <button onclick="labelTimeline.seek('main')">跳转 Main</button>
      <button onclick="labelTimeline.seek('outro')">跳转 Outro</button>
    </div>
    <div class="box box-1" id="box-label"></div>
    <div class="info">
      <div>使用标签精确控制跳转位置</div>
    </div>
  </div>

</body>
</html>
