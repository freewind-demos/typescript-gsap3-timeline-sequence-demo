<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GSAP 3 Timeline 序列动画演示</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      padding: 40px;
    }
    h1 {
      text-align: center;
      margin-bottom: 30px;
      color: #00d9ff;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
    }
    .box {
      width: 80px;
      height: 80px;
      margin: 20px auto;
      border-radius: 12px;
    }
    .box-1 { background: linear-gradient(135deg, #667eea, #764ba2); }
    .box-2 { background: linear-gradient(135deg, #f093fb, #f5576c); }
    .box-3 { background: linear-gradient(135deg, #4facfe, #00f2fe); }
    .controls {
      text-align: center;
      margin: 30px 0;
    }
    button {
      background: #00d9ff;
      color: #1a1a2e;
      border: none;
      padding: 12px 24px;
      margin: 0 8px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, background 0.2s;
    }
    button:hover {
      transform: scale(1.05);
      background: #00b8d9;
    }
    .info {
      background: #16213e;
      border-radius: 12px;
      padding: 20px;
      margin-top: 30px;
      font-family: monospace;
      font-size: 14px;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>GSAP 3 Timeline 序列动画演示</h1>

    <div class="box box-1" id="box1"></div>
    <div class="box box-2" id="box2"></div>
    <div class="box box-3" id="box3"></div>

    <div class="controls">
      <button onclick="playSequence()">播放序列</button>
      <button onclick="playComplex()">复杂编排</button>
      <button onclick="reverseSequence()">反向播放</button>
      <button onclick="pauseAll()">暂停</button>
      <button onclick="resetAll()">重置</button>
    </div>

    <div class="info">
      <div>当前时间: <span id="time">0</span>s</div>
      <div>总时长: <span id="duration">0</span>s</div>
      <div>进度: <span id="progress">0</span>%</div>
    </div>
  </div>

  <script type="module" src="./dist/main.js"></script>
</body>
</html>
